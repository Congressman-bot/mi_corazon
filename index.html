<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Corazon</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" >
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=League+Gothic&family=Noto+Sans+Arabic:wght@100..900&family=Noto+Sans+Caucasian+Albanian&family=Pinyon+Script&family=SN+Pro:ital,wght@0,200..900;1,200..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <style>
        body{
            font-family: "Pinyon Script";
            margin: 0;
            background: rgb(36, 35, 36);
            color: #000000;
            text-align: center;
            padding: 0;
            overflow-x: hidden;
            height: 100vh;
        }

        .section{
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1{
            font-size: 3rem;
            color: #ff9b9b;
        }

        .photo-card{
            background-color: pink;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px 8px rgba(255, 15, 15, 0.5);
            max-width: 400px;
        }

        img{
            width: 50%;
            border: 10px;
            border-radius: 20px;
        }

        p {
            font-size: 1.2rem;
            margin-top: 15px;
            
        }

        .heart-container{
            display: flex;
            justify-content: center;
            align-items: center;
            align-content: center;
            height: 100%;
            width: 100%;
        }

        .heart{
            color: red;
        }
    </style>
</head>
<body>
    <div class="heart-container">
        <div data-aos="fade-up" class="big-heart">
            <i class="fa-solid fa-heart fa-beat-fade" data-aos="fade-up" style="
                color: rgb(251, 27, 27); 
                font-size: 150px;"
            ></i>
        </div>
    </div>
    <div class="section">
        <h1 data-aos="zoom-in">Hey Nkirote... </h1>
        <p data-aos="fade-up" data-aos-delay="500" style="color: pink;">I wanna tell you something</p>
    </div>

    <div class="section">
        <div class="photo-card" data-aos="fade-right">
            <img src="images/mi_corazon.jpeg" alt="You're my morning star" >
            <p>***I love how your smile lights brightens up my day...***</p>
        </div>
    </div>

    <div class="section">
        <div class="photo-card" data-aos="fade-left" data-aos-delay="500">
            <img src="images/mi_arma.jpeg" alt="You're my morning star">
            <p>***Still can't wait to see you one day... ***</p>
        </div>
    </div>

    <div class="section">
        <h1 data-aos="flip-up">I Love You!</h1>
        <span class="heart">
            <i class="fa-solid fa-heart fa-beat-fade" style="color: rgb(251, 27, 27);"></i>
            <i class="fa-solid fa-heart fa-beat-fade" style="color: rgb(251, 27, 27);"></i>
            <i class="fa-solid fa-heart fa-beat-fade" style="color: rgb(251, 27, 27);"></i>
        </span>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1200
        });
    </script>
</body>
</html>
